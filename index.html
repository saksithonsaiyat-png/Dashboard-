<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Executive Task Dashboard - Final</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <style>
    body {
      background: radial-gradient(circle at top right, rgba(216,180,254,.15), transparent 40%),
                  linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .glass-card {
      background: rgba(30, 41, 59, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      border-radius: 1rem;
    }
    .status-badge { padding: 4px 10px; border-radius: 12px; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
  </style>
</head>
<body class="text-slate-200 min-h-screen p-4 md:p-6">

<header class="flex flex-col xl:flex-row justify-between items-start xl:items-center gap-6 mb-8 border-b border-white/10 pb-6">
  <div>
    <h1 class="text-2xl md:text-3xl font-bold text-white flex items-center gap-3">
      <i class="fa-solid fa-bolt text-emerald-400"></i> Executive Monitor
    </h1>
    <p class="text-slate-400 text-sm mt-1">ระบบพร้อมใช้งาน - ข้อมูลจะถูกบันทึกในเครื่องอัตโนมัติ (Auto-Save)</p>
  </div>
  
  <div class="flex flex-wrap items-center gap-3">
    <div class="glass-card px-4 py-2.5 flex items-center gap-3">
      <label class="text-xs text-slate-400 font-bold uppercase">วันที่ใช้งาน:</label>
      <input id="dateFilter" type="date" class="bg-transparent border-none text-sky-400 text-sm focus:ring-0 cursor-pointer font-bold outline-none" />
    </div>
    <label class="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 cursor-pointer shadow-lg shadow-emerald-900/40 transition-all active:scale-95">
      <i class="fa-solid fa-file-import"></i>Import นำเข้าไฟล์
      <input id="fileUpload" type="file" accept=".xlsx,.xls,.csv" class="hidden" />
    </label>
    <button onclick="hardReset()" class="bg-rose-500/20 text-rose-400 hover:bg-rose-500 hover:text-white px-4 py-2.5 rounded-xl text-xs font-bold transition-all">
      <i class="fa-solid fa-trash-can mr-1"></i> ล้างข้อมูล
    </button>
  </div>
</header>

<div id="statusAlert" class="hidden mb-6 p-4 rounded-xl text-sm font-medium flex items-center gap-3"></div>

<!-- Dropdown Filters -->
<section class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
  <div class="glass-card p-3 px-4 flex items-center justify-between">
    <label class="text-xs text-slate-400 uppercase font-bold w-1/3">กรองพนักงาน:</label>
    <select id="employeeSelect" class="w-2/3 bg-slate-900 border border-slate-700 rounded-lg text-sm text-slate-200 py-1.5 px-3 outline-none focus:border-sky-500"></select>
  </div>
  <div class="glass-card p-3 px-4 flex items-center justify-between">
    <label class="text-xs text-slate-400 uppercase font-bold w-1/3">กลุ่มงาน (Sheet):</label>
    <select id="jobTypeSelect" class="w-2/3 bg-slate-900 border border-slate-700 rounded-lg text-sm text-slate-200 py-1.5 px-3 outline-none focus:border-sky-500"></select>
  </div>
</section>

<!-- Stats Grid -->
<section class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
  <div class="glass-card p-6 border-b-4 border-emerald-500">
    <p class="text-xs text-slate-400 uppercase font-bold tracking-wider mb-2">Routine Progress</p>
    <h3 id="routineStat" class="text-4xl font-black text-emerald-400">0%</h3>
    <p id="routineCountLabel" class="text-[10px] text-slate-500 mt-2">0/0 งานเสร็จสิ้น</p>
  </div>
  <div class="glass-card p-6 border-b-4 border-sky-500">
    <p class="text-xs text-slate-400 uppercase font-bold tracking-wider mb-2">Adhoc Pending</p>
    <h3 id="adhocStat" class="text-4xl font-black text-sky-400">0</h3>
    <p class="text-[10px] text-slate-500 mt-2">กำลังดำเนินการ</p>
  </div>
  <div class="glass-card p-6 border-b-4 border-amber-500">
    <p class="text-xs text-slate-400 uppercase font-bold tracking-wider mb-2">Near Deadline</p>
    <h3 id="nearStat" class="text-4xl font-black text-amber-400">0</h3>
    <p class="text-[10px] text-slate-500 mt-2">ต้องติดตาม</p>
  </div>
  <div class="glass-card p-6 border-b-4 border-rose-500">
    <p class="text-xs text-slate-400 uppercase font-bold tracking-wider mb-2">Overdue</p>
    <h3 id="overdueStat" class="text-4xl font-black text-rose-400">0</h3>
    <p class="text-[10px] text-slate-500 mt-2">เกินกำหนด</p>
  </div>
</section>

<div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
  <!-- Routine Tasks -->
  <div class="xl:col-span-1 glass-card overflow-hidden flex flex-col h-[600px]">
    <div class="p-4 bg-slate-800/50 border-b border-white/5 flex justify-between items-center">
        <h2 class="font-bold text-emerald-400 flex items-center gap-2">
            <i class="fa-solid fa-calendar-check"></i> Routine Tasks
        </h2>
    </div>
    <div id="routineContainer" class="p-4 space-y-3 overflow-y-auto flex-1">
        <!-- Injected via JS -->
    </div>
  </div>

  <!-- Adhoc Table -->
  <div class="xl:col-span-2 glass-card overflow-hidden flex flex-col h-[600px]">
    <div class="p-4 bg-slate-800/50 border-b border-white/5 flex justify-between items-center">
        <h2 class="font-bold text-sky-400 flex items-center gap-2">
            <i class="fa-solid fa-list-check"></i> Adhoc & Projects
        </h2>
    </div>
    <div class="overflow-x-auto flex-1 p-2">
        <table class="w-full text-sm text-left">
            <thead class="text-[10px] text-slate-500 uppercase tracking-widest border-b border-slate-700">
                <tr>
                    <th class="px-4 py-3">Task Name</th>
                    <th class="px-4 py-3">Owner</th>
                    <th class="px-4 py-3">Group</th>
                    <th class="px-4 py-3">Deadline</th>
                    <th class="px-4 py-3 text-center">Status</th>
                </tr>
            </thead>
            <tbody id="adhocTableBody" class="divide-y divide-slate-800">
                <!-- Injected via JS -->
            </tbody>
        </table>
    </div>
  </div>
</div>

<script>
// --- 1. State & LocalStorage Setup ---
// เปลี่ยน KEY ใหม่เพื่อเคลียร์ข้อมูลเก่าที่ทำให้เว็บค้าง
const DB_KEY = 'Executive_Dash_Data_V3'; 

const appState = {
    tasks: [],
    selectedDate: '',
    filters: { employee: 'all', jobType: 'all' }
};

const el = id => document.getElementById(id);

// --- 2. Initialization ---
function init() {
    // ใช้วันที่ปัจจุบันเป็นค่าเริ่มต้นเสมอ (ป้องกันบัควันที่)
    const todayStr = new Date().toISOString().slice(0, 10);
    appState.selectedDate = todayStr;
    el('dateFilter').value = todayStr;

    // โหลดข้อมูล
    loadTasks();
    updateDropdowns();
    renderUI();
}

// --- 3. Persistence (การจดจำข้อมูล) ---
function saveTasks() {
    try {
        localStorage.setItem(DB_KEY, JSON.stringify(appState.tasks));
    } catch(e) {
        console.error("Save failed:", e);
    }
}

function loadTasks() {
    try {
        const stored = localStorage.getItem(DB_KEY);
        if (stored) {
            appState.tasks = JSON.parse(stored);
        }
    } catch(e) {
        console.error("Load failed:", e);
        appState.tasks = [];
    }
}

function hardReset() {
    if(confirm('ยืนยันการล้างข้อมูลทั้งหมดในระบบใช่หรือไม่?')) {
        localStorage.removeItem(DB_KEY);
        location.reload();
    }
}

// --- 4. Excel Parser (ตัวอ่านไฟล์แบบรับจบ) ---
function parseAnyExcel(workbook) {
    let allData = [];
    
    workbook.SheetNames.forEach(sheetName => {
        // ดึงข้อมูลทั้งหมดออกมา
        const rawRows = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], { defval: '' });
        
        rawRows.forEach((row, index) => {
            const keys = Object.keys(row);
            if (keys.length === 0) return; // ข้ามแถวว่าง

            // ฟังก์ชันช่วยหาคอลัมน์
            const getVal = (keywords) => {
                const foundKey = keys.find(k => keywords.some(kw => String(k).toLowerCase().includes(kw)));
                return foundKey ? String(row[foundKey]).trim() : '';
            };

            // ดึงชื่องาน (ถ้าหาไม่เจอ ให้ใช้คอลัมน์ใดคอลัมน์หนึ่งที่มีข้อมูลแทน)
            let taskName = getVal(['task', 'ชื่องาน', 'title', 'cat_name', 'รายการ']);
            if (!taskName) {
                // กวาดหาคอลัมน์แรกที่ไม่ใช่รหัสหรือชื่อพนักงาน
                const backupKey = keys.find(k => !String(k).toLowerCase().includes('staff') && String(row[k]).trim() !== '');
                if (backupKey) taskName = String(row[backupKey]).trim();
            }
            if (!taskName || taskName === 'ไม่ได้ระบุชื่องาน' || taskName.includes('Company Name')) return; // ข้ามแถวขยะ

            // ดึงคนรับผิดชอบ
            const ownerId = getVal(['staff code', 'รหัส', 'ownerid']) || 'UNK';
            const ownerName = getVal(['staff nm', 'ชื่อ', 'ownername']) || 'ไม่ระบุ';

            // ดึงหมวดหมู่ (เช็คจากหลายๆ จุด)
            let cat = 'Adhoc';
            const checkStr = (sheetName + ' ' + getVal(['category', 'cat_name', 'ประเภท'])).toLowerCase();
            if (checkStr.includes('routine') || checkStr.includes('job') || checkStr.includes('ประเภทงาน') || checkStr.includes('ประจำ')) {
                cat = 'Routine';
            }

            allData.push({
                id: `T${Date.now()}${Math.floor(Math.random()*1000)}`,
                category: cat,
                jobType: sheetName,
                taskName: taskName,
                ownerId: ownerId,
                ownerName: ownerName,
                deadline: getVal(['deadline', 'due', 'กำหนด', 'date']), // ดึงวันที่มาเก็บไว้
                status: 'pending' // ค่าเริ่มต้นคือยังไม่เสร็จ
            });
        });
    });
    
    return allData;
}

// --- 5. Event Listeners ---
el('fileUpload').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    
    showAlert('กำลังนำเข้าข้อมูล...', 'sky');
    
    const reader = new FileReader();
    reader.onload = (evt) => {
        try {
            const data = evt.target.result;
            const wb = XLSX.read(data, { type: 'binary' });
            
            const newTasks = parseAnyExcel(wb);
            
            if (newTasks.length === 0) {
                showAlert('นำเข้าไม่สำเร็จ: ไม่พบตารางข้อมูลที่ใช้อ่านได้', 'rose');
                return;
            }

            appState.tasks = newTasks;
            saveTasks(); // เซฟทันที
            updateDropdowns();
            renderUI();
            
            showAlert(`นำเข้าสำเร็จ ${newTasks.length} รายการ`, 'emerald');
            e.target.value = ''; // เคลียร์ input
        } catch (err) {
            console.error(err);
            showAlert('ไฟล์เกิดข้อผิดพลาด หรือนามสกุลไม่ถูกต้อง', 'rose');
        }
    };
    reader.readAsBinaryString(file);
});

el('dateFilter').addEventListener('change', (e) => {
    const val = e.target.value;
    if (val) {
        appState.selectedDate = val;
        renderUI();
    } else {
        // ถ้าผู้ใช้กดเคลียร์วันที่ ให้บังคับกลับมาวันนี้
        const todayStr = new Date().toISOString().slice(0, 10);
        appState.selectedDate = todayStr;
        el('dateFilter').value = todayStr;
        renderUI();
    }
});

el('employeeSelect').addEventListener('change', (e) => { appState.filters.employee = e.target.value; renderUI(); });
el('jobTypeSelect').addEventListener('change', (e) => { appState.filters.jobType = e.target.value; renderUI(); });

// --- 6. Helper Functions ---
function showAlert(msg, color) {
    const alert = el('statusAlert');
    alert.className = `mb-4 p-3 rounded-lg text-sm font-bold flex items-center gap-2 bg-${color}-500/20 text-${color}-400 border border-${color}-500/30`;
    alert.innerHTML = `<i class="fa-solid fa-circle-check"></i> ${msg}`;
    setTimeout(() => { alert.classList.add('hidden'); }, 5000);
}

function updateDropdowns() {
    const emps = [...new Map(appState.tasks.map(t => [t.ownerId, t.ownerName])).entries()];
    el('employeeSelect').innerHTML = '<option value="all">พนักงานทุกคน</option>' + 
        emps.map(([id, name]) => `<option value="${id}">${name}</option>`).join('');

    const types = [...new Set(appState.tasks.map(t => t.jobType))];
    el('jobTypeSelect').innerHTML = '<option value="all">ทุกกลุ่มงาน (Sheet)</option>' + 
        types.map(t => `<option value="${t}">${t}</option>`).join('');
}

window.toggleTaskStatus = function(taskId) {
    const task = appState.tasks.find(t => t.id === taskId);
    if (task) {
        task.status = (task.status === 'done') ? 'pending' : 'done';
        saveTasks(); // เซฟทุกครั้งที่กด
        renderUI();
    }
}

// --- 7. Rendering (การวาดหน้าจอ) ---
function renderUI() {
    const { employee, jobType } = appState.filters;
    
    // กรองข้อมูลตาม Dropdown
    const filteredTasks = appState.tasks.filter(t => {
        const mEmp = employee === 'all' || t.ownerId === employee;
        const mType = jobType === 'all' || t.jobType === jobType;
        return mEmp && mType;
    });

    const routineTasks = filteredTasks.filter(t => t.category === 'Routine');
    const adhocTasks = filteredTasks.filter(t => t.category === 'Adhoc');

    // 1. วาดสถิติ
    const rDone = routineTasks.filter(t => t.status === 'done').length;
    el('routineStat').innerText = routineTasks.length ? `${Math.round((rDone/routineTasks.length)*100)}%` : '0%';
    el('routineCountLabel').innerText = `${rDone}/${routineTasks.length} งานเสร็จสิ้น`;
    
    el('adhocStat').innerText = adhocTasks.filter(t => t.status !== 'done').length;
    
    // คำนวณ Overdue & Near (เฉพาะที่ยังไม่เสร็จ)
    let nearCount = 0, overdueCount = 0;
    const today = new Date(appState.selectedDate);
    
    filteredTasks.forEach(t => {
        if (t.status === 'done') return;
        if (!t.deadline) { nearCount++; return; } // ถือว่าค้าง
        
        // ถ้าแปลงวันที่เป็น ISO ได้
        if (/^\d{4}-\d{2}-\d{2}$/.test(t.deadline) || !isNaN(new Date(t.deadline).getTime())) {
             const dl = new Date(t.deadline);
             if (dl < today) overdueCount++;
             else nearCount++;
        } else {
             nearCount++; // วันที่พัง ถือว่าค้างปกติ
        }
    });

    el('nearStat').innerText = nearCount;
    el('overdueStat').innerText = overdueCount;

    // 2. วาด Routine List
    const rCont = el('routineContainer');
    if (routineTasks.length === 0) {
        rCont.innerHTML = '<div class="text-center py-10 text-slate-500 text-sm">ไม่พบงาน Routine</div>';
    } else {
        rCont.innerHTML = routineTasks.map(t => `
            <div class="bg-slate-900/60 p-4 rounded-xl border border-slate-700/50 hover:border-emerald-500/50 transition-all cursor-pointer flex items-center justify-between" onclick="toggleTaskStatus('${t.id}')">
                <div class="flex items-center gap-4">
                    <div class="w-5 h-5 rounded flex items-center justify-center border-2 transition-colors ${t.status === 'done' ? 'bg-emerald-500 border-emerald-500' : 'border-slate-500 bg-slate-800'}">
                        ${t.status === 'done' ? '<i class="fa-solid fa-check text-[10px] text-white"></i>' : ''}
                    </div>
                    <div>
                        <h4 class="text-sm font-bold ${t.status === 'done' ? 'line-through text-slate-500' : 'text-slate-200'}">${t.taskName}</h4>
                        <p class="text-[10px] text-slate-400 mt-1 uppercase font-bold tracking-wider">${t.ownerName} • ${t.jobType}</p>
                    </div>
                </div>
            </div>
        `).join('');
    }

    // 3. วาด Adhoc Table
    const aBody = el('adhocTableBody');
    if (adhocTasks.length === 0) {
        aBody.innerHTML = '<tr><td colspan="5" class="py-10 text-center text-slate-500">ไม่พบรายการงาน</td></tr>';
    } else {
        aBody.innerHTML = adhocTasks.map(t => `
            <tr class="hover:bg-white/5 transition border-b border-white/5 group cursor-pointer" onclick="toggleTaskStatus('${t.id}')">
                <td class="px-4 py-4">
                    <div class="text-sm font-semibold ${t.status === 'done' ? 'text-slate-500 line-through' : 'text-slate-200'}">${t.taskName}</div>
                </td>
                <td class="px-4 py-4 text-xs font-bold text-sky-400">${t.ownerName}</td>
                <td class="px-4 py-4 text-[10px] uppercase font-bold text-slate-500 tracking-wider">${t.jobType}</td>
                <td class="px-4 py-4 text-xs text-slate-400">${t.deadline || '-'}</td>
                <td class="px-4 py-4 text-center">
                    <span class="status-badge ${t.status === 'done' ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'}">
                        ${t.status === 'done' ? 'Completed' : 'Pending'}
                    </span>
                </td>
            </tr>
        `).join('');
    }
}

// เริ่มการทำงาน
init();
</script>
</body>
</html>
